version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruter-tech-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - recruter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruter-tech-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - recruter-network

networks:
  recruter-network:
    driver: bridge

volumes:
  uploads:
